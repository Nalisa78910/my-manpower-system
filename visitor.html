<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนพนักงานใหม่</title>
    
    <!-- เรียกใช้ Firebase (เพิ่ม Storage เข้ามาสำหรับเก็บรูป) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>

    <!-- เรียกใช้ Library บีบอัดรูปภาพ (เบาและทำงานบนมือถือได้ดี) -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="tel"], select { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; 
        }
        
        .photo-upload { text-align: center; margin-bottom: 20px; border: 2px dashed #3498db; padding: 20px; border-radius: 5px; }
        #preview { max-width: 150px; border-radius: 10px; display: none; margin: 10px auto; }
        input[type="file"] { display: none; }
        .btn-upload { background: #3498db; color: white; padding: 10px 20px; border-radius: 5px; display: inline-block; cursor: pointer; }
        
        .btn-submit { width: 100%; padding: 15px; background: #00b900; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        
        #loading { display: none; text-align: center; margin-top: 15px; font-weight: bold; padding: 15px; border-radius: 5px; line-height: 1.5;}
        .loading-process { background-color: #e8f4f8; color: #2980b9; border: 1px solid #3498db; }
        .loading-error { background-color: #fdeaea; color: #c0392b; border: 1px solid #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h2>ลงทะเบียนพนักงาน</h2>
    <form id="registerForm">
        
        <div class="photo-upload">
            <label class="btn-upload" for="photoInput">📸 ถ่ายรูปหรือเลือกรูป</label>
            <input type="file" id="photoInput" accept="image/*" required>
            <img id="preview" alt="ภาพตัวอย่าง">
            <p id="fileSizeInfo" style="font-size: 12px; color: #888; margin-top: 5px;"></p>
        </div>

        <div class="form-group">
            <label>ชื่อ-นามสกุล *</label>
            <input type="text" id="fullname" required placeholder="นาย สมชาย ใจดี">
        </div>

        <div class="form-group">
            <label>เลขบัตรประชาชน 13 หลัก *</label>
            <input type="tel" id="idCard" pattern="\d{13}" maxlength="13" required placeholder="1234567890123" oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');">
        </div>

        <div class="form-group">
            <label>เบอร์โทรศัพท์ 10 หลัก *</label>
            <input type="tel" id="phone" pattern="\d{10}" maxlength="10" required placeholder="0812345678" oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');">
        </div>

        <div class="form-group">
            <label>ทะเบียนรถ (ถ้ามี)</label>
            <input type="text" id="vehicle" placeholder="เช่น กข 1234 กทม">
        </div>

        <div class="form-group">
            <label>บริษัทต้นสังกัด *</label>
            <select id="company" required>
                <option value="">-- กำลังโหลดรายชื่อบริษัท --</option>
            </select>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">บันทึกข้อมูล</button>
        <div id="loading" class="loading-process">รอการประมวลผล...</div>
    </form>
</div>

<script>
    // 1. ตั้งค่า Firebase
const firebaseConfig = {
  apiKey: "AIzaSyArJLTChk1lyzfTph6ELTdzKIdb4sQ_ybc",
  authDomain: "maersk-mcl-v2.firebaseapp.com",
  projectId: "maersk-mcl-v2",
  storageBucket: "maersk-mcl-v2.firebasestorage.app",
  messagingSenderId: "447590679734",
  appId: "1:447590679734:web:f6881338981f9ae86bd217",
  measurementId: "G-9CPJJVL2G6"
};

    
    // ตรวจสอบว่าเคยเชื่อมต่อ Firebase ไว้หรือยัง (ป้องกัน Error)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const db = firebase.firestore();
    const storage = firebase.storage();

    // 2. ดึง LINE ID จาก URL
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');

    if(!uid) {
        alert("⚠️ ไม่พบข้อมูล LINE ID!\nกรุณาเข้าสู่ระบบผ่านหน้าแรก (index.html)");
        document.getElementById("submitBtn").disabled = true;
    }

    let compressedImageFile = null;

    // 3. โหลดรายชื่อบริษัท
    async function loadCompanies() {
        const companySelect = document.getElementById("company");
        try {
            const snapshot = await db.collection("companies").get();
            companySelect.innerHTML = '<option value="">-- เลือกบริษัท --</option>'; 
            
            if (snapshot.empty) {
                companySelect.innerHTML += '<option value="DummyCompany">บริษัททดสอบ (ยังไม่มีในฐานข้อมูล)</option>';
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                companySelect.innerHTML += `<option value="${doc.id}">${data.name}</option>`;
            });
        } catch (error) {
            console.error("Error loading companies:", error);
            companySelect.innerHTML = '<option value="">-- โหลดข้อมูลล้มเหลว --</option>';
            document.getElementById("loading").style.display = "block";
            document.getElementById("loading").className = "loading-error";
            document.getElementById("loading").innerHTML = "❌ โหลดรายชื่อบริษัทไม่สำเร็จ! โปรดตรวจสอบ Firestore Rules";
        }
    }
    loadCompanies();

    // 4. จัดการรูปภาพ (โชว์พรีวิว + บีบอัด)
    document.getElementById("photoInput").addEventListener("change", async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        try {
            const options = {
                maxSizeMB: 0.3,
                maxWidthOrHeight: 1024,
                useWebWorker: true
            };
            
            document.getElementById("fileSizeInfo").innerText = "กำลังบีบอัดรูปภาพ...";
            
            compressedImageFile = await imageCompression(file, options);
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById("preview").src = e.target.result;
                document.getElementById("preview").style.display = "block";
            }
            reader.readAsDataURL(compressedImageFile);

            const sizeKB = (compressedImageFile.size / 1024).toFixed(1);
            document.getElementById("fileSizeInfo").innerText = `ขนาดไฟล์พร้อมส่ง: ${sizeKB} KB`;

        } catch (error) {
            console.error("Error compressing image:", error);
            alert("เกิดข้อผิดพลาดในการจัดการรูปภาพ กรุณาลองใหม่");
        }
    });

    // 5. เมื่อกดปุ่ม "บันทึกข้อมูล"
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
        e.preventDefault(); 

        if (!compressedImageFile) {
            alert("กรุณาถ่ายรูปหรืออัปโหลดรูปภาพด้วยครับ");
            return;
        }

        if (!uid) {
            alert("ข้อผิดพลาด: ไม่พบรหัสผู้ใช้งาน (UID) กรุณากลับไปเข้าสู่ระบบใหม่");
            return;
        }

        const btnSubmit = document.getElementById("submitBtn");
        const loadingText = document.getElementById("loading");

        btnSubmit.disabled = true;
        loadingText.className = "loading-process";
        loadingText.style.display = "block";
        
        try {
            // ----- ขั้นตอนที่ 1: อัปโหลดรูปภาพ (เพิ่มระบบเช็ค %) -----
            loadingText.innerHTML = "⏳ ขั้นตอนที่ 1/2: กำลังเตรียมเซิร์ฟเวอร์... 0%";
            console.log("กำลังอัปโหลดรูปภาพ...");
            
            const imageRef = storage.ref(`profile_images/${uid}.jpg`);
            
            // ใช้ Promise ดักจับ Task การอัปโหลดเพื่อให้เห็นเปอร์เซ็นต์
            const imageUrl = await new Promise((resolve, reject) => {
                const uploadTask = imageRef.put(compressedImageFile);
                
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        // คำนวณเปอร์เซ็นต์
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        loadingText.innerHTML = `⏳ ขั้นตอนที่ 1/2: กำลังส่งรูปภาพ... ${Math.round(progress)}%`;
                    }, 
                    (error) => {
                        // ถ้าติด Error ตอนอัปโหลดรูป
                        reject(error);
                    }, 
                    async () => {
                        // ถ้าอัปโหลดรูปเสร็จ 100%
                        const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                        resolve(downloadURL);
                    }
                );
            });
            
            console.log("อัปโหลดรูปสำเร็จ URL:", imageUrl);

            // ----- ขั้นตอนที่ 2: บันทึกข้อมูลลงฐานข้อมูล -----
            loadingText.innerHTML = "⏳ ขั้นตอนที่ 2/2: กำลังบันทึกประวัติพนักงาน...";
            console.log("กำลังบันทึกข้อมูลลง Firestore...");
            
            const userData = {
                uid: uid,
                fullname: document.getElementById("fullname").value,
                idCard: document.getElementById("idCard").value,
                phone: document.getElementById("phone").value,
                vehicle: document.getElementById("vehicle").value || "-",
                companyId: document.getElementById("company").value,
                photoUrl: imageUrl,
                role: "visitor",
                status: "pending", 
                registeredAt: firebase.firestore.FieldValue.serverTimestamp() 
            };

            await db.collection("users").doc(uid).set(userData);
            
            console.log("บันทึกข้อมูลสำเร็จ");

            // ----- ขั้นตอนที่ 3: เสร็จสมบูรณ์ -----
            loadingText.innerHTML = "✅ ลงทะเบียนสำเร็จ! กำลังพาท่านไปหน้าถัดไป...";
            loadingText.style.backgroundColor = "#d4edda";
            loadingText.style.color = "#155724";
            loadingText.style.borderColor = "#c3e6cb";
            
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);

        } catch (error) {
            console.error("Error saving data:", error);
            loadingText.className = "loading-error";
            loadingText.innerHTML = `❌ เกิดข้อผิดพลาด: ${error.message} <br><br><small>ข้อแนะนำ: ตรวจสอบเมนู Storage ใน Firebase ว่าเปิดใช้งานแล้วหรือยัง</small>`;
            btnSubmit.disabled = false;
        }
    });

</script>

</body>
</html>
