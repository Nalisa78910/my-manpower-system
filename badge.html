<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Badge - บัตรพนักงาน</title>
    
    <!-- เรียกใช้ Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    
    <!-- เรียกใช้ Library สร้าง QR Code (เบาและทำงานแบบ Offline ได้) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #e9ecef; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .badge-card { background: white; width: 100%; max-width: 350px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); overflow: hidden; text-align: center; padding-bottom: 30px; }
        
        .header-bg { background: #34495e; height: 100px; width: 100%; }
        
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; margin-top: -60px; object-fit: cover; background: #f0f0f0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        h2 { margin: 15px 0 5px 0; color: #333; font-size: 22px; }
        p.company { margin: 0; color: #7f8c8d; font-size: 16px; margin-bottom: 15px; }
        
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; color: white; margin-bottom: 15px; font-size: 14px; }
        
        /* สีสถานะต่างๆ */
        .status-pending { background-color: #f39c12; } /* สีเหลือง รออนุมัติ */
        .status-approved { background-color: #27ae60; } /* สีเขียว อนุมัติแล้ว */
        .status-rejected { background-color: #c0392b; } /* สีแดง ไม่อนุมัติ/แบน */

        .qr-container { display: flex; justify-content: center; margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 10px; width: 80%; margin-left: auto; margin-right: auto; }
        
        #loading { color: #555; margin-top: 50px; }
        .content { display: none; /* ซ่อนไว้ก่อนจนกว่าข้อมูลจะโหลดเสร็จ */ }
        
        .info-message { font-size: 13px; font-weight: bold; padding: 15px; margin: 0 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <h3 id="loading">กำลังโหลดข้อมูลบัตร...</h3>

    <div class="badge-card content" id="badgeContent">
        <div class="header-bg"></div>
        <img id="profilePic" class="profile-img" src="" alt="Profile Picture">
        <h2 id="empName">ชื่อ - นามสกุล</h2>
        <p class="company" id="empCompany">บริษัทต้นสังกัด</p>
        
        <div id="statusBadge" class="status-badge status-pending">รออนุมัติ</div>
        
        <!-- ส่วนแสดง QR Code (จะซ่อนไว้ก่อนถ้ายังไม่อนุมัติ) -->
        <div id="qrSection" style="display: none;">
            <p style="font-size: 12px; color: #999; margin-bottom: 5px;">QR Code สำหรับสแกนเข้า-ออก</p>
            <div class="qr-container">
                <div id="qrcode"></div>
            </div>
        </div>

        <!-- ส่วนแสดงข้อความแจ้งเตือนเมื่อยังไม่อนุมัติ -->
        <div id="noQrMessage" class="info-message" style="display: none;"></div>
        
    </div>

    <script>
        // 1. ตั้งค่า Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyArJLTChk1lyzfTph6ELTdzKIdb4sQ_ybc",
            authDomain: "maersk-mcl-v2.firebaseapp.com",
            projectId: "maersk-mcl-v2",
            storageBucket: "maersk-mcl-v2.firebasestorage.app",
            messagingSenderId: "447590679734",
            appId: "1:447590679734:web:f6881338981f9ae86bd217",
            measurementId: "G-9CPJJVL2G6"
        };
        // ตรวจสอบก่อนว่ามีการ initialize หรือยัง
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 2. ดึง UID จาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid') || localStorage.getItem('myAppUserId');

        let qrCodeObj = null; // ตัวแปรเก็บ Object QR Code

        if(!uid) {
            document.getElementById("loading").innerText = "ไม่พบข้อมูล กรุณาเข้าสู่ระบบใหม่";
        } else {
            // 3. ดึงข้อมูลแบบ Real-time (onSnapshot)
            db.collection("users").doc(uid).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    
                    // ใส่ข้อมูลลงในการ์ด
                    // เช็คว่ารูปเป็น base64 (ขึ้นต้นด้วย data:image) หรือ url ธรรมดา
                    document.getElementById("profilePic").src = data.photoUrl && data.photoUrl.startsWith('data:image') ? data.photoUrl : (data.photoUrl || "https://via.placeholder.com/150");
                    document.getElementById("empName").innerText = data.fullname;
                    
                    // ส่วนจัดการ UI
                    const statusEl = document.getElementById("statusBadge");
                    const qrSection = document.getElementById("qrSection");
                    const noQrMessage = document.getElementById("noQrMessage");

                    // ตรวจสอบสถานะเพื่อแสดง QR Code
                    if (data.status === "approved") {
                        statusEl.innerText = "✅ อนุมัติแล้ว (พร้อมเข้างาน)";
                        statusEl.className = "status-badge status-approved";
                        
                        // แสดง QR ซ่อนข้อความเตือน
                        qrSection.style.display = "block";
                        noQrMessage.style.display = "none";

                        // สร้าง QR Code หากยังไม่เคยสร้าง
                        if (!qrCodeObj) {
                            qrCodeObj = new QRCode(document.getElementById("qrcode"), {
                                text: uid, // ใช้ UID เป็นข้อมูลใน QR Code ให้ รปภ. สแกน
                                width: 150,
                                height: 150,
                                colorDark : "#000000",
                                colorLight : "#ffffff",
                                correctLevel : QRCode.CorrectLevel.H
                            });
                        }
                    } else {
                        // ซ่อน QR แสดงข้อความเตือน
                        qrSection.style.display = "none";
                        noQrMessage.style.display = "block";

                        if(data.status === "pending") {
                            statusEl.innerText = "⏳ รออนุมัติ";
                            statusEl.className = "status-badge status-pending";
                            noQrMessage.innerText = "กรุณารอฝ่ายบุคคลอนุมัติบัตร เพื่อแสดง QR Code สำหรับสแกนเข้าพื้นที่";
                            noQrMessage.style.backgroundColor = "#fcf3cf";
                            noQrMessage.style.color = "#b9770e";
                        } else if (data.status === "rejected" || data.status === "banned") {
                            statusEl.innerText = "❌ ไม่อนุมัติ / ระงับสิทธิ์";
                            statusEl.className = "status-badge status-rejected";
                            noQrMessage.innerText = "บัตรถูกระงับการใช้งาน ไม่สามารถสแกนเข้าพื้นที่ได้";
                            noQrMessage.style.backgroundColor = "#fadbd8";
                            noQrMessage.style.color = "#943126";
                        }
                    }

                    // ปิด Loading และแสดงการ์ด
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("badgeContent").style.display = "block";

                    // ไปดึงชื่อบริษัทมาแสดงให้สวยงาม
                    if(data.companyId) {
                        db.collection("companies").doc(data.companyId).get().then(compDoc => {
                            if(compDoc.exists) {
                                document.getElementById("empCompany").innerText = compDoc.data().name;
                            }
                        });
                    }

                } else {
                    document.getElementById("loading").innerText = "ไม่พบประวัติการลงทะเบียนในระบบ";
                }
            });
        }
    </script>
</body>
</html>
